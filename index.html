
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAHMASTRA | AI Concierge</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-orbit {
            animation: orbit 10s linear infinite;
        }
        @keyframes pulse-om {
            0%, 100% { 
                transform: scale(1); 
                opacity: 0.3;
                filter: drop-shadow(0 0 2px currentColor);
            }
            50% { 
                transform: scale(1.15); 
                opacity: 1;
                filter: drop-shadow(0 0 15px currentColor);
            }
        }
        .animate-om {
            animation: pulse-om 4s ease-in-out infinite;
        }
        .glow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        .glow-gold {
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
        }
        
    </style>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const protocol = window.location.protocol;
      const isSupportedProtocol = protocol === 'http:' || protocol === 'https:';
      
      if (!isSupportedProtocol) {
        console.debug('BRAHMASTRA: System Node restricted. PWA deployment requires standard web protocols.');
        return;
      }

      try {
        const swUrl = './sw.js';
        navigator.serviceWorker.register(swUrl)
          .then(reg => {
            console.debug('BRAHMASTRA: Local Node synchronized successfully.');
          })
            
          .catch(err => {
            if (err.name === 'SecurityError' || err.message.includes('origin') || err.message.includes('protocol')) {
              console.warn('BRAHMASTRA: PWA deployment bypassed due to host security constraints.');
            } else {
              console.error('BRAHMASTRA: Local Node failure:', err);
            }
          });
      } catch (e) {
        console.warn('BRAHMASTRA: System Link skipped.');
      }
    });
  }
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
